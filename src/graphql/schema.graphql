type User {
  id: ID!
  name: String!
  email: String!
  password: String!
  role: String!
}

type Booking {
  id: ID!
  startTime: String!
  endTime: String!
  status: String!
  totalPrice: String!
  createdAt: String!
  user: User
}

type Space {
  id: ID!
  name: String!
  type: String!
  capacity: Int!
  pricePerHour: Int!
  isActive: Boolean!
  createdAt: String!
  bookings: [Booking!]
}

type OccupancyAnalytics {
  totalSpaces: Int!
  occupancyRate: Float!
  totalRevenue: Float!
  membershipsExpiringSoon: Int!
  topUsers: [String!]!
}

type Query {
  spaces(type: String, minCapacity: Int): [Space!]!
  space(id: ID!): Space
  occupancyAnalytics: OccupancyAnalytics!
}
